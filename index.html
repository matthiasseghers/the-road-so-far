<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Road So Far</title>
    <!--
      Blocking theme script — must run before any CSS is painted to prevent FOUC.
      Reads localStorage for a saved preference, falls back to prefers-color-scheme.
      Applies .dk or .lt to <html> synchronously so the first paint uses the right tokens.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('rsf-theme');
        var dark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(dark ? 'dk' : 'lt');
      })();
    </script>
    <!-- Google Fonts preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root">
      <!--
        Inline loading screen — shown between first paint and React mounting.
        Colours are hardcoded to match --bg-app / --text-secondary for both
        themes so there is no FOUC. Removed automatically when React mounts
        by replacing #root's innerHTML via createRoot().render().
      -->
      <style>
        #app-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          /* light */
          background: #f7f5ff;
        }
        .dk #app-loader {
          background: #0e0a1f;
        }
        #app-loader-wordmark {
          font-family: Georgia, serif;
          font-size: 15px;
          letter-spacing: 0.12em;
          font-weight: 600;
          /* light */
          color: #2d1b69;
        }
        .dk #app-loader-wordmark {
          color: #c4b5fd;
        }
        #app-loader-spinner {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          border: 2.5px solid transparent;
          /* light */
          border-top-color: #2d1b69;
          border-right-color: #2d1b69;
          animation: rsf-spin 0.8s linear infinite;
        }
        .dk #app-loader-spinner {
          border-top-color: #c4b5fd;
          border-right-color: #c4b5fd;
        }
        @keyframes rsf-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="app-loader">
        <div id="app-loader-wordmark">THE ROAD SO FAR</div>
        <div id="app-loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
