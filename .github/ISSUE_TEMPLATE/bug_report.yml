name: Bug Report
description: Report a bug or unexpected behaviour
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Before creating a bug report**

        - Make sure you are running the latest version of the app.
        - Search [existing issues](https://github.com/matthiasseghers/the-road-so-far/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - npm run dev (local)
        - Docker
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: e.g. Chrome 125, Firefox 128

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, console output, etc.
