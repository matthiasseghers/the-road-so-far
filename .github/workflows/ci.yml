name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (app)
        run: npx tsc --project tsconfig.app.json --noEmit

      - name: Typecheck (server)
        run: npx tsc --project server/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
